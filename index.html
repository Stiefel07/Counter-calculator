<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingshot Counter Tool</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#172554,#1e3a8a,#7c3aed);
color:#fff;
}
.container{
max-width:700px;
margin:30px auto;
padding:20px;
}
.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border-radius:18px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
h1{
    text-align:center;
    color:#ffd54f;
    font-size:46px;
    line-height:1.05;
    margin-bottom:28px;
    position:relative;
    left:-10px;
}

.subtitle{
display:block;
font-size:28px;
font-weight:700;
margin-top:8px;
}
label{display:block;margin-top:12px;font-weight:bold}
input,select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
margin-top:20px;
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
background:#f59e0b;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
}
button:hover{background:#d97706}
.result{
    margin-top:20px;
    background:#0f172a;
    padding:16px;
    border-left:5px solid #22c55e;
    border-radius:10px;
    line-height:1.6;
}

.infoBox{
    margin:20px 0 24px;
    padding:16px 18px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    color:#fff;
    font-size:20px;
    line-height:1.4;
    text-align:center;
}
#helpBtn{
    width:100%;
    margin-bottom:20px;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#helpBtn:hover{
    background:#1d4ed8;
}
    #helpPopup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    z-index:9999;
    justify-content:center;
    align-items:center;
}
#helpContent{
    background:#fff;
    color:#222;
    width:90%;
    max-width:520px;
    max-height:85vh;
    overflow-y:auto;
    border-radius:18px;
    padding:24px;
    text-align:left;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
}

#helpContent h2{
    margin-top:0;
    color:#2563eb;
    text-align:center;
}

#helpContent p{
    font-size:18px;
    line-height:1.6;
}

#closeHelpBtn{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

#closeHelpBtn:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1 id="title">
Kingshot<br>
<span class="subtitle">Counter Tool</span>
</h1>
<div id="infoBox" class="infoBox"></div>
<button id="helpBtn" type="button">
    ⓘ How to find enemy percentages
</button>
<div id="helpPopup" style="display:none;">
    <div id="helpContent">
        <img src="Groß.png" alt="Help" style="width:100%;height:auto;border-radius:12px;">
    </div>
</div>
<label id="langLabel">Language</label>
<select id="lang" onchange="setLang()">
<option value="en">English</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
</select>

<label id="infLabel">Infantry (%)</label>
<input id="inf" type="number" value="33">

<label id="cavLabel">Cavalry (%)</label>
<input id="cav" type="number" value="33">

<label id="arcLabel">Marksmen (%)</label>
<input id="arc" type="number" value="34">

<label id="modeLabel">Mode</label>
<select id="mode"></select>
<label id="targetLabel">Target</label>

<select id="target">
    <option value="castle">🏰 Castle</option>
    <option value="outpost">🏕️ Outpost</option>
    <option value="shrine">🏛️ Shrine / Fortress</option>
</select>
<button id="calcBtn" onclick="calc()"></button>

<div id="out" class="result"></div><button id="copyBtn" onclick="copyResult()" style="display:none"></button>

</div>
</div>

<script>
const text={
de:{
title:"⚔️ Kingshot Konterrechner",lang:"Sprache",
inf:"Infanterie (%)",cav:"Kavallerie (%)",arc:"Schützen (%)",
mode:"Modus",
target:"Ziel",
info:"Gib zuerst die Truppenverteilung des Gegners in Prozent ein.",
castle:"🏰 Burg",
outpost:"🏕️ Außenposten",
shrine:"🏛️ Heiligtum / Festung",
calc:"Konter berechnen",
rally:"🏰 Rallyeführer",solo:"⚔️ Solo (Schloss)",
lead:"Empfohlene Haupttruppe",dist:"Anführer",fill:"Füller",counter:"Kontert",copy:"In Chat kopieren",copied:"Kopiert!",
enemyFocus:"Gegnerfokus",
counterLevel:"Konterstufe",
counterAdvantage:"Kontervorteil",
stageBalanced:"Ausgeglichen",
stageLight:"Leicht",
stageMedium:"Mittel",
stageHeavy:"Stark",
help:"So findest du die gegnerischen Truppenprozente",
helpPopup:"<h2>📊 Wo finde ich die gegnerischen Truppenwerte?</h2><p>1. Öffne den Kampfbericht.<br><br>2. Scrolle bis <b>„Schwadron insgesamt“</b>.<br><br>3. Tippe auf das kleine <b>ⓘ</b>-Symbol.<br><br>4. Es öffnet sich ein Fenster mit den Prozentwerten der gegnerischen Truppen.<br><br>5. Übertrage diese Werte für Infanterie, Kavallerie und Schützen in den Rechner.<br><br><div id="helpImage"></div></p>",
},
en:{
title:"⚔️ Kingshot Counter Tool",lang:"Language",
inf:"Infantry (%)",cav:"Cavalry (%)",arc:"Marksmen (%)",
mode:"Mode",
target:"Target",
info:"Enter the enemy troop percentages below.",
castle:"🏰 Castle",
outpost:"🏕️ Outpost",
shrine:"🏛️ Shrine / Fortress",
calc:"Calculate Counter",
rally:"🏰 Rally Leader",solo:"⚔️ Solo (Castle)",
lead:"Recommended Main Troop",dist:"Leader",fill:"Fillers",counter:"Counters",copy:"Copy to Chat",copied:"Copied!",
enemyFocus:"Enemy Focus",
counterLevel:"Counter Level",
counterAdvantage:"Counter Advantage",
stageBalanced:"Balanced Counter",
stageLight:"Light",
stageMedium:"Medium",
stageHeavy:"Heavy",
help:"How to find enemy troop percentages",
helpPopup:"<h2>📊 Where can I find the enemy troop percentages?</h2><p>1. Open the battle report.<br><br>2. Scroll down to <b>Squad Total</b>.<br><br>3. Tap the small <b>ⓘ</b> icon.<br><br>4. A window will open showing the enemy troop percentages.<br><br>5. Enter the Infantry, Cavalry and Marksmen percentages into the Counter Tool.</p>",
},
es:{
title:"⚔️ Calculadora Kingshot",lang:"Idioma",
inf:"Infantería (%)",cav:"Caballería (%)",arc:"Tiradores (%)",
mode:"Modo",
target:"Objetivo",
info:"Introduce los porcentajes de tropas enemigas.",
castle:"🏰 Castillo",
outpost:"🏕️ Puesto avanzado",
shrine:"🏛️ Santuario / Fortaleza",
calc:"Calcular Contraataque",
rally:"🏰 Líder de Rally",solo:"⚔️ Solo (Castillo)",
lead:"Tropa principal recomendada",dist:"Líder",fill:"Participantes",counter:"Contrarresta",copy:"Copiar al chat",copied:"¡Copiado!",
enemyFocus:"Enfoque enemigo",
counterLevel:"Nivel de contraataque",
counterAdvantage:"Ventaja de contraataque",
stageBalanced:"Equilibrado",
stageLight:"Ligero",
stageMedium:"Medio",
stageHeavy:"Fuerte",
help:"Cómo encontrar los porcentajes enemigos",
helpPopup:"<h2>📊 ¿Dónde puedo encontrar los porcentajes de tropas enemigas?</h2><p>1. Abre el informe de batalla.<br><br>2. Desplázate hasta <b>«Escuadrón total»</b>.<br><br>3. Pulsa el pequeño icono <b>ⓘ</b>.<br><br>4. Se abrirá una ventana con los porcentajes de las tropas enemigas.<br><br>5. Introduce los porcentajes de Infantería, Caballería y Tiradores en la Calculadora de Contraataque.</p>",
},
};

function setLang(){
let l=lang.value,t=text[l];
const currentMode = mode.value;
const currentTarget = target.value;
title.innerText=t.title;
langLabel.innerText=t.lang;
infLabel.innerText=t.inf;
cavLabel.innerText=t.cav;
arcLabel.innerText=t.arc;
modeLabel.innerText=t.mode;
targetLabel.innerText=t.target;
infoBox.innerText = t.info;
helpBtn.innerText = "ⓘ " + t.help;
// helpContent.innerHTML = t.helpPopup;
calcBtn.innerText=t.calc;

mode.innerHTML="";
mode.add(new Option(t.rally,"rally"));
mode.add(new Option(t.solo,"solo"));
mode.value = currentMode || "rally";
target.innerHTML="";
target.add(new Option(t.castle,"castle"));
target.add(new Option(t.outpost,"outpost"));
target.add(new Option(t.shrine,"shrine"));
target.value = currentTarget || "castle";
if(copyBtn.style.display!=="none"){
    copyBtn.innerText=t.copy;
}

// Ergebnis nicht löschen
if(out.innerHTML.trim() !== ""){
    calc();
}

}
helpBtn.onclick = function () {
    helpPopup.style.display = "flex";
};
helpPopup.onclick = function (e) {
    if (e.target === helpPopup) {
helpPopup.style.display = "none";        
    }
};
window.onload = function () {
setLang();
    
};


function calc(){
let i=+inf.value,c=+cav.value,a=+arc.value;

if(i+c+a!==100){
    out.innerHTML="<b>100% required.</b>";
    return;
}

const vals={Infantry:i,Cavalry:c,Marksmen:a};
const sorted=Object.entries(vals).sort((x,y)=>y[1]-x[1]);
const enemy=sorted[0][0];
const highest=sorted[0][1];

const counter={
"Infantry":"Marksmen",
"Marksmen":"Cavalry",
"Cavalry":"Infantry"
};

const names={
de:{Infantry:"Infanterie",Cavalry:"Kavallerie",Marksmen:"Schützen"},
en:{Infantry:"Infantry",Cavalry:"Cavalry",Marksmen:"Marksmen"},
es:{Infantry:"Infantería",Cavalry:"Caballería",Marksmen:"Tiradores"}
};

let l=lang.value,t=text[l];

let stage="Balanced Counter";
let filler=33;
let leaderPercent = 45;
let fillerPercent = filler;

if(highest>=60){
    stage="Heavy";
    filler=50;
}
else if(highest>=50){
    stage="Medium";
    filler=46;
}
else if(highest>=40){
    stage="Light";
    filler=44;
}
else{
    stage="Balanced Counter";
    filler=42;
}
leaderPercent = 45;
fillerPercent = filler;

switch(target.value){

case "castle":
    leaderPercent = 45;
    fillerPercent = filler;
    break;

case "outpost":
    leaderPercent = 55;
    fillerPercent = Math.max(filler,45);
    break;

case "shrine":
    leaderPercent = 60;
    fillerPercent = Math.max(filler,50);
    break;

}
let main=counter[enemy];

function dist(main,p){
let rest=100-p;
let side=Math.floor(rest/2);

let d={Infantry:side,Cavalry:side,Marksmen:side};
d[main]=p;
let keys=["Infantry","Cavalry","Marksmen"];
let rem=100-(d.Infantry+d.Cavalry+d.Marksmen);
for(let k of keys){
 if(k!=main){d[k]+=rem;break;}
}
return `${d.Infantry}% ${names[l].Infantry}<br>${d.Cavalry}% ${names[l].Cavalry}<br>${d.Marksmen}% ${names[l].Marksmen}`;
}

if(mode.value==="rally"){
let leader=dist(main,leaderPercent);
let fillers=dist(main,fillerPercent);
let advantage;

if(highest>=60){
    advantage="🟢 High";
}
else if(highest>=50){
    advantage="🟡 Medium";
}
else if(highest>=40){
    advantage="🔵 Small";
}
else{
    advantage="⚪ Minimal";
}

out.innerHTML = `
<b>${t.enemyFocus}:</b> ${names[l][enemy]} (${highest}%)<br>
<b>${t.counterLevel}:</b> ${stage}<br>
<b>${t.counterAdvantage}:</b> ${advantage}<br><br>
📤 <b>${t.dist}:</b><br>${leader}<br><br>
👥 <b>${t.fill}:</b><br>${fillers}
`;
copyBtn.style.display="block";
copyBtn.innerText=t.copy;
}else{
out.innerHTML="<b>"+t.lead+":</b><br>"+dist(main,leaderPercent);
copyBtn.style.display="none";
}
}

function copyResult(){
    const result = out.innerText;
    navigator.clipboard.writeText(result);
    copyBtn.innerText = text[lang.value].copied;
}

</script>

<footer style="
text-align:center;
margin:20px 0 10px;
font-size:17px;
font-weight:700;
letter-spacing:1.5px;
background:linear-gradient(90deg,#FFD54F,#FFFFFF,#FFD54F);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 12px rgba(255,213,79,.35);">
⚔️ Powered by Stiefel™ ⚔️
</footer>
<div style="
text-align:center;
font-size:12px;
color:#d1d5db;
margin-bottom:20px;
line-height:1.5;">
Unofficial fan-made tool for Kingshot.<br>
Kingshot is a trademark of its respective owner.
</div>
</body>
</html>
