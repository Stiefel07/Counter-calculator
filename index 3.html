<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingshot Counter Tool</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#172554,#1e3a8a,#7c3aed);
color:#fff;
}
.container{
max-width:700px;
margin:30px auto;
padding:20px;
}
.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border-radius:18px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
h1{text-align:center;color:#ffd54f}
label{display:block;margin-top:12px;font-weight:bold}
input,select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
margin-top:20px;
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
background:#f59e0b;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
}
button:hover{background:#d97706}
.result{
margin-top:20px;
background:#0f172a;
padding:16px;
border-left:5px solid #22c55e;
border-radius:10px;
line-height:1.6;
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1 id="title">⚔️ Kingshot Counter Tool</h1>

<label id="langLabel">Language</label>
<select id="lang" onchange="setLang()">
<option value="de">Deutsch</option>
<option value="en">English</option>
<option value="es">Español</option>
</select>

<label id="infLabel">Infantry (%)</label>
<input id="inf" type="number" value="33">

<label id="cavLabel">Cavalry (%)</label>
<input id="cav" type="number" value="33">

<label id="arcLabel">Marksmen (%)</label>
<input id="arc" type="number" value="34">

<label id="modeLabel">Mode</label>
<select id="mode"></select>

<button id="calcBtn" onclick="calc()"></button>

<div id="out" class="result"></div>

</div>
</div>

<script>
const text={
de:{
title:"⚔️ Kingshot Konterrechner",lang:"Sprache",
inf:"Infanterie (%)",cav:"Kavallerie (%)",arc:"Schützen (%)",
mode:"Modus",calc:"Konter berechnen",
rally:"🏰 Rallyeführer",solo:"⚔️ Solo (Schloss)",
lead:"Empfohlene Haupttruppe",dist:"Verteilung"
},
en:{
title:"⚔️ Kingshot Counter Tool",lang:"Language",
inf:"Infantry (%)",cav:"Cavalry (%)",arc:"Marksmen (%)",
mode:"Mode",calc:"Calculate Counter",
rally:"🏰 Rally Leader",solo:"⚔️ Solo (Castle)",
lead:"Recommended Main Troop",dist:"Formation"
},
es:{
title:"⚔️ Calculadora Kingshot",lang:"Idioma",
inf:"Infantería (%)",cav:"Caballería (%)",arc:"Tiradores (%)",
mode:"Modo",calc:"Calcular Contraataque",
rally:"🏰 Líder de Rally",solo:"⚔️ Solo (Castillo)",
lead:"Tropa principal recomendada",dist:"Formación"
}
};

function setLang(){
let l=lang.value,t=text[l];
title.innerText=t.title;
langLabel.innerText=t.lang;
infLabel.innerText=t.inf;
cavLabel.innerText=t.cav;
arcLabel.innerText=t.arc;
modeLabel.innerText=t.mode;
calcBtn.innerText=t.calc;
mode.innerHTML="";
mode.add(new Option(t.rally,"rally"));
mode.add(new Option(t.solo,"solo"));
out.innerHTML="";
}
setLang();

function calc(){
let i=+inf.value,c=+cav.value,a=+arc.value;
if(i+c+a!==100){
out.innerHTML="<b>100% required.</b>";
return;
}
let arr=[
{name:"Infantry",v:i},
{name:"Cavalry",v:c},
{name:"Marksmen",v:a}
].sort((x,y)=>y.v-x.v);

const counter={
"Infantry":"Marksmen",
"Marksmen":"Cavalry",
"Cavalry":"Infantry"
};

let main=counter[arr[0].name];
let l=lang.value,t=text[l];

const names={
de:{Infantry:"Infanterie",Cavalry:"Kavallerie",Marksmen:"Schützen"},
en:{Infantry:"Infantry",Cavalry:"Cavalry",Marksmen:"Marksmen"},
es:{Infantry:"Infantería",Cavalry:"Caballería",Marksmen:"Tiradores"}
};

let troop=names[l][main];

if(mode.value==="rally"){
out.innerHTML="<b>"+t.lead+":</b> "+troop+"<br><b>"+t.dist+":</b> 60% / 20% / 20%";
}else{
out.innerHTML="<b>"+t.lead+":</b> "+troop+"<br><b>"+t.dist+":</b> 70% / 15% / 15%";
}
}
</script>
</body>
</html>
